<div class="container">
  <h3 class="title fs-26 bold">Добавление нового пользователя</h3>
  <div class="form-wrapper">
    <form class="create-user-form" [formGroup]="createUserForm">
      <div class="form-field">
        <label class="fs-16">Name: </label>
        <input type="text" formControlName="name">
      </div>
  
      <div class="form-field">
        <label class="fs-16">Surname: </label>
        <input type="text" formControlName="surname">
      </div>
  
      <div class="form-field">
        <label class="fs-16">Email: </label>
        <input type="email" formControlName="email">
      </div>
  
      <div class="form-field">
        <label class="fs-16">Phone: </label>
        <input type="text" formControlName="phone">
      </div>
  
      <div class="form-field">
        <label class="fs-16">Website: </label>
        <input type="text" formControlName="website">
      </div>
  
      <ng-container formGroupName="address">
        <div class="form-field">
          <label class="fs-16">Address city: </label>
          <input type="text" formControlName="city">
        </div>
  
        <div class="form-field">
          <label class="fs-16">Address street: </label>
          <input type="text" formControlName="street">
        </div>
  
        <div class="form-field">
          <label class="fs-16">Address suite: </label>
          <input type="text" formControlName="suite">
        </div>
  
        <div class="form-field">
          <label class="fs-16">Address zipcode: </label>
          <input type="text" formControlName="zipcode">
        </div>
  
        <ng-container formGroupName="geo">
          <div class="form-field">
            <label class="fs-16">Address geo lat: </label>
            <input type="text" formControlName="lat">
          </div>
  
          <div class="form-field">
            <label class="fs-16">Address geo lng: </label>
            <input type="text" formControlName="lng">
          </div>
        </ng-container>
      </ng-container>
  
      <ng-container formGroupName="company">
        <div class="form-field">
          <label class="fs-16">Company name: </label>
          <input type="text" formControlName="name">
        </div>
  
        <div class="form-field">
          <label class="fs-16">Company catch phrase: </label>
          <input type="text" formControlName="catchPhrase">
        </div>
  
        <div class="form-field">
          <label class="fs-16">Company bs: </label>
          <input type="text" formControlName="bs">
        </div>
      </ng-container>
    </form>
  </div>
  <button class="create-user-btn" type="button" (click)="onSubmit()" [disabled]="createUserForm.invalid">Добавить</button>
</div>
